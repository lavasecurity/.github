name: Security

# lavasecurity/.github is itself a privileged CI repo — it hosts the org's reusable
# workflows, so a bad edit here affects every consuming repo. It therefore runs the same
# backstop on its own history (gitleaks) and lints its own workflow YAML (actionlint).
#
# It calls the reusable workflow by LOCAL path (./.github/workflows/security.yml) rather
# than @main on purpose: on a pull_request this exercises the version of the workflow
# UNDER REVIEW, so a PR that breaks the reusable interface (e.g. renames an input) or a
# scanner job fails here instead of only after merge, once consumers are affected. On
# push to main the local path resolves to main. The reusable workflow only triggers on
# workflow_call, so there is no recursion.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  security:
    uses: ./.github/workflows/security.yml
    with:
      gitleaks: true
      actionlint: true
